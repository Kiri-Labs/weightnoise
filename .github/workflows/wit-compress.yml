name: WIT Compress 27B -> 0.8B
on:
  push:
    branches: [wit-run]

jobs:
  wit-compress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install torch transformers huggingface_hub safetensors sentencepiece protobuf accelerate
      - name: Run WIT compress
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 .github/workflows/wit_compress_script.py
