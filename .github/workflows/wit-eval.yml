name: WIT Eval
on:
  push:
    branches: [main]

jobs:
  eval-wit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -q torch transformers huggingface_hub
      - name: Evaluate
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bash .github/workflows/wit-eval.sh
