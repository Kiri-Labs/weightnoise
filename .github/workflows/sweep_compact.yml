name: Extreme SVD compression sweep
on:
  push:
    branches: [compact-extreme]
jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: pip install -q torch transformers huggingface_hub
      - name: Sweep
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: timeout 1800 python3 -c "import sys; sys.path.insert(0,'.'); exec(open('.github/workflows/sweep_compact.py').read())"
