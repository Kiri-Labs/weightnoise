name: Compact test + push
on:
  push:
    branches: [compact-push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: pip install -q torch transformers huggingface_hub
      - name: Test
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 .github/workflows/compact_test.py
