name: Test SVD compact (real file compression)
on:
  push:
    branches: [test-compact]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          pip install -q torch transformers huggingface_hub
          pip install -e .
      - name: Run compact test
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 .github/workflows/test_compact.py
