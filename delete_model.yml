name: Delete fake compression model
on:
  push:
    branches: [delete-fake]
jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -q huggingface_hub
      - name: Delete
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 -c "
import os
from huggingface_hub import HfApi
HfApi(token=os.environ['HF_TOKEN']).delete_repo('KiriLabs/Qwen3.5-0.8B-SVD-Ob-1.59x')
print('Deleted')
"
